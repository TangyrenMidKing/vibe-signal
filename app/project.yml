name: VibeSignal
options:
  bundleIdPrefix: com.vibesignal
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
settings:
  SWIFT_VERSION: "5.9"
  DEVELOPMENT_TEAM: ""
targets:
  VibeSignal:
    type: application
    platform: iOS
    sources:
      - path: iOS
      - path: Shared
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vibesignal.app
      PRODUCT_NAME: Vibe Signal
      INFOPLIST_FILE: iOS/Info.plist
      TARGETED_DEVICE_FAMILY: "1"
      CODE_SIGN_ENTITLEMENTS: iOS/AgentPulse.entitlements
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: VibeSignalWatch
        embed: true
    scheme:
      testTargets: []

  VibeSignalWatch:
    type: application
    platform: watchOS
    sources:
      - path: Watch
      - path: Shared
        excludes:
          - AgentPulseClient.swift
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vibesignal.app.watchkitapp
      PRODUCT_NAME: Vibe Signal
      INFOPLIST_FILE: Watch/Info.plist
      SDKROOT: watchos
      TARGETED_DEVICE_FAMILY: "4"
      SKIP_INSTALL: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
