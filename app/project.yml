name: AgentPulse
options:
  bundleIdPrefix: com.agentpulse
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
settings:
  SWIFT_VERSION: "5.9"
  DEVELOPMENT_TEAM: ""
targets:
  AgentPulse:
    type: application
    platform: iOS
    sources:
      - path: iOS
      - path: Shared
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.agentpulse.app
      INFOPLIST_FILE: iOS/Info.plist
      TARGETED_DEVICE_FAMILY: "1"
      CODE_SIGN_ENTITLEMENTS: iOS/AgentPulse.entitlements
      ASSETCATALOG_COMPILER_APPICON_NAME: ""
    dependencies:
      - target: AgentPulseWatch
        embed: true
    scheme:
      testTargets: []

  AgentPulseWatch:
    type: application
    platform: watchOS
    sources:
      - path: Watch
      - path: Shared
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.agentpulse.app.watchkitapp
      INFOPLIST_FILE: Watch/Info.plist
      SDKROOT: watchos
      TARGETED_DEVICE_FAMILY: "4"
      SKIP_INSTALL: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: ""
